name: Engine

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - update-djt
      - engine

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DJT_OVERLAP_HOURS: "24"

concurrency:
  group: djt-engine
  cancel-in-progress: false

jobs:
  engine:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Shuffle the pile
        id: update
        continue-on-error: true
        run: |
          node src/update-djt.mjs

          if git diff --quiet -- djt.json README.md; then
            echo "Nothing moved."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add djt.json README.md
          git commit -m "Move things around"
          git push

      - name: Keep engine warm
        if: always()
        run: sleep 270

      - name: Start successor
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in 1 2 3; do
            if curl --fail-with-body --silent --show-error \
              --request POST \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/dispatches \
              --data '{"event_type":"engine"}'; then
              echo "Successor queued."
              exit 0
            fi
            sleep 10
          done

          echo "Could not queue successor." >&2
          exit 1

      - name: Handoff
        if: always()
        run: sleep 30

      - name: Report update failure
        if: always() && steps.update.outcome == 'failure'
        run: |
          echo "The archive update failed, but the engine handoff was attempted." >&2
          exit 1
